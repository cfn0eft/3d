name: Build Windows exe (PoseLab Studio)

# GPU (CUDA) 同梱の配布版をビルドする。手動実行 (workflow_dispatch) か
# vX.Y.Z タグの push で走り、Actions の Artifacts に zip を置く。
# CUDA 11.8 版 torch を同梱 (ドライバ 452 以降で動作、古い GPU にも広く対応。
# GPU が無い環境では自動的に CPU 実行になる)。

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-exe:
    runs-on: windows-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch (CUDA 11.8)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch==2.1.2 torchvision==0.16.2 --index-url https://download.pytorch.org/whl/cu118

      - name: Install OpenMMLab stack
        run: |
          pip install -U openmim
          mim install mmengine "mmcv==2.1.0" "mmdet==3.2.0" "mmpose==1.3.2"

      - name: Install poselab and PyInstaller
        run: |
          pip install -e .
          pip install "pyinstaller>=6.3" pyinstaller-hooks-contrib

      - name: Sanity check (imports)
        run: |
          python -c "import torch; print('torch', torch.__version__, 'cuda build:', torch.version.cuda)"
          python -c "from mmpose.apis.inferencers import Pose3DInferencer; print('mmpose OK')"
          python -c "from poselab.studio import build_app_js; print('gui', len(build_app_js()), 'bytes')"

      - name: Build exe (PyInstaller)
        working-directory: packaging
        run: pyinstaller poselab_studio.spec --noconfirm --distpath ../dist-exe

      - name: Selftest (bundled imports)
        run: dist-exe/PoseLabStudio/PoseLabStudio.exe --selftest

      - name: Archive
        run: Compress-Archive -Path dist-exe/PoseLabStudio -DestinationPath PoseLabStudio-win64-cuda118.zip

      - name: Report size
        run: Get-Item PoseLabStudio-win64-cuda118.zip | Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB)}}

      - uses: actions/upload-artifact@v4
        with:
          name: PoseLabStudio-win64-cuda118
          path: PoseLabStudio-win64-cuda118.zip
          compression-level: 0
          retention-days: 30
