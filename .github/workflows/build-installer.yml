name: Build Windows installer (PoseLab Studio)

# 小さなオンラインインストーラー (PoseLabStudioSetup.exe) をビルドする。
# 配布物は数十 MB で、実行時に uv が専用 Python + PyTorch (GPU 自動判定) +
# mmpose + poselab を取得・構築する。実機検証として CPU レシピを CI で通す。
# 手動実行 / vX.Y.Z タグ / packaging の PR で走る。

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "packaging/installer/**"
      - ".github/workflows/build-installer.yml"

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build poselab wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir packaging/installer/wheels

      - name: Fetch uv (online installer engine)
        shell: pwsh
        run: |
          $url = "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile uv.zip
          Expand-Archive uv.zip -DestinationPath packaging/installer -Force
          if (-not (Test-Path packaging/installer/uv.exe)) { throw "uv.exe の取得に失敗" }

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $ver = (Select-String -Path poselab/__init__.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # 実機相当の検証 1: ローカルインストールスクリプト (推奨配布物。署名不要)。
      # 実際の Python venv に CPU 版 torch + mmcv/mmdet/mmpose + poselab を入れ、
      # ショートカット作成と import まで通す。
      - name: Verify local-install script (CPU)
        shell: pwsh
        run: |
          ./packaging/installer/install_local.ps1 -InstallDir "$env:RUNNER_TEMP\plslocal" -Cpu

      # 実機相当の検証 2: uv ベースのオンラインインストールのレシピを CPU で通す。
      - name: Verify online-install recipe (CPU)
        shell: pwsh
        working-directory: packaging/installer
        run: |
          ./setup_env.ps1 -InstallDir "$env:RUNNER_TEMP\plstest" -Cpu -UvExe "$PWD\uv.exe" -Wheelhouse "$PWD\wheels"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: packaging/installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "poselab_studio.iss" "/DAppVersion=${{ steps.ver.outputs.version }}"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup のビルドに失敗" }

      - name: Report installer size
        shell: pwsh
        run: |
          Get-Item packaging/installer/Output/PoseLabStudioSetup.exe |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB, 1)}}

      - uses: actions/upload-artifact@v4
        with:
          name: PoseLabStudioSetup
          path: packaging/installer/Output/PoseLabStudioSetup.exe
          retention-days: 30

      # タグ push 時は GitHub Release に直リンクで添付 (ログイン不要・無期限)
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/installer/Output/PoseLabStudioSetup.exe
